apiVersion: org.eclipse.che/v2
kind: CheCluster
metadata:
  name: devspaces
  namespace: openshift-devspaces
spec:
  components:
    cheServer:
      debug: false
    dashboard: {}
    devWorkspace: {}
    pluginRegistry: {}
  devEnvironments:
    startTimeoutSeconds: 600
    storage:
      pvcStrategy: per-user
    defaultNamespace:
      autoProvision: true
---
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-devspaces
