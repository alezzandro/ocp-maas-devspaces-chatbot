apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: redhat-ods-applications
  labels:
    app: maas-postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: maas-postgres
  template:
    metadata:
      labels:
        app: maas-postgres
    spec:
      containers:
        - name: postgres
          image: registry.redhat.io/rhel9/postgresql-16:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              value: maasuser
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: maas-postgres-credentials
                  key: password
            - name: POSTGRESQL_DATABASE
              value: maasdb
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/pgsql/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: redhat-ods-applications
  labels:
    app: maas-postgres
spec:
  selector:
    app: maas-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
