apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payload-processing-allow
  namespace: openshift-ingress
  labels:
    app.kubernetes.io/part-of: models-as-a-service
spec:
  podSelector:
    matchLabels:
      app: payload-processing
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {}
  egress:
  - {}
