---
- name: Patch RHEL systems
  hosts: all
  become: true
  serial: "25%"

  pre_tasks:
    - name: Check current kernel version
      ansible.builtin.command: uname -r
      register: kernel_before
      changed_when: false

  tasks:
    - name: Update all packages
      ansible.builtin.dnf:
        name: "*"
        state: latest
        security: true
      register: update_result

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot if kernel was updated
      ansible.builtin.reboot:
        reboot_timeout: 300
        msg: "Reboot initiated by Ansible for kernel update"
      when: update_result.changed and 'kernel' in update_result.results | default([]) | join(' ')

  post_tasks:
    - name: Verify system is healthy after patching
      ansible.builtin.command: systemctl is-system-running
      register: system_status
      changed_when: false
      failed_when: system_status.stdout not in ['running', 'degraded']
